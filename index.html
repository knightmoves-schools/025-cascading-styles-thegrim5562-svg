<html>

<head>
    <title>Cascading Styles</title>
    <style>
        .text-area p {
            color: purple;
        }

        p {
            color: hotpink;
        }
    </style>
</head>

<body>
    <div style="color: purple;" class="text-area">
        <p>This is a paragraph inside a div with class "text-area".</p>
    </div>
    <p>This is a paragraph outside the div with class "text-area".</p>    
</body>

</html>
